<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Sustainability Twin AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }
        
        /* Cute Character */
        .character-container {
            position: fixed;
            bottom: 80px;
            left: -200px;
            z-index: 1000;
            pointer-events: none;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .character {
            position: relative;
            font-size: 120px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }
        
        /* Playful jump animation */
        .character.jumping {
            animation: playfulJump 0.6s ease-in-out 3;
        }
        
        @keyframes playfulJump {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(-10deg); }
            75% { transform: translateY(-30px) rotate(10deg); }
        }
        
        /* Waving hand */
        .character-hand {
            position: absolute;
            font-size: 60px;
            top: 20px;
            right: -10px;
            transform-origin: bottom center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .character-hand.waving {
            opacity: 1;
            animation: enthusiasticWave 0.4s ease-in-out infinite;
        }
        
        @keyframes enthusiasticWave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-40deg); }
            75% { transform: rotate(40deg); }
        }
        
        /* Speech Bubble */
        .speech-bubble {
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: white;
            padding: 20px 35px;
            border-radius: 30px;
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            white-space: nowrap;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .speech-bubble.show {
            transform: translateX(-50%) scale(1);
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 20px solid white;
        }
        
        /* Floating leaves background */
        .floating-leaves {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .leaf {
            position: absolute;
            font-size: 30px;
            animation: float 15s infinite ease-in-out;
            opacity: 0.3;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }
        
        /* Login Container */
        .login-wrapper {
            position: relative;
            z-index: 3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            opacity: 0;
            transform: translateX(100vw);
            transition: all 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .login-container.slide-in {
            opacity: 1;
            transform: translateX(0);
        }
        
        .login-left {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .login-left::before {
            content: '🌱';
            position: absolute;
            font-size: 200px;
            opacity: 0.1;
            top: -50px;
            right: -50px;
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .login-right {
            padding: 60px 40px;
        }
        
        .sdg-icons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        .sdg-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        .sdg-icon:nth-child(1) { animation-delay: 0s; }
        .sdg-icon:nth-child(2) { animation-delay: 0.2s; }
        .sdg-icon:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-outline-success, .btn-outline-danger {
            transition: all 0.3s ease;
        }
        
        .btn-outline-success:hover, .btn-outline-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .tab-content {
            margin-top: 20px;
        }
        
        .nav-tabs .nav-link {
            color: #667eea;
            transition: all 0.3s ease;
        }
        
        .nav-tabs .nav-link:hover {
            transform: translateY(-2px);
        }
        
        .nav-tabs .nav-link.active {
            color: #764ba2;
            font-weight: 600;
        }
        
        .alert {
            border-radius: 10px;
            animation: slideDown 0.5s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h2 {
            animation: fadeIn 1s ease-out 5s both;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .character {
                font-size: 80px;
            }
            .character-hand {
                font-size: 40px;
            }
            .speech-bubble {
                font-size: 22px;
                padding: 15px 25px;
            }
            .login-left::before {
                font-size: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Leaves Background -->
    <div class="floating-leaves">
        <div class="leaf" style="left: 10%; animation-delay: 0s;">🍃</div>
        <div class="leaf" style="left: 30%; animation-delay: 2s;">🌿</div>
        <div class="leaf" style="left: 50%; animation-delay: 4s;">🍃</div>
        <div class="leaf" style="left: 70%; animation-delay: 6s;">🌿</div>
        <div class="leaf" style="left: 90%; animation-delay: 8s;">🍃</div>
    </div>
    
    <!-- Cute Character -->
    <div class="character-container" id="character-container">
        <div class="speech-bubble" id="speech-bubble">Hi! 👋</div>
        <div class="character" id="character">
            🐻
            <div class="character-hand" id="character-hand">👋</div>
        </div>
    </div>
    
    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="container">
            <div class="login-container" id="login-container">
                <!-- Left Side -->
                <div class="col-md-5 login-left" style="float: left; width: 41.666667%;">
                    <h1 class="mb-4"><i class="fas fa-leaf"></i> Campus Sustainability Twin AI</h1>
                    <p class="lead">Intelligent Complaint Analysis & Resource Management System</p>
                    <p>Join us in making our campus more sustainable and efficient.</p>
                    
                    <div class="sdg-icons">
                        <div class="sdg-icon" title="SDG 6: Clean Water">
                            <i class="fas fa-tint"></i>
                        </div>
                        <div class="sdg-icon" title="SDG 11: Sustainable Cities">
                            <i class="fas fa-city"></i>
                        </div>
                        <div class="sdg-icon" title="SDG 12: Responsible Consumption">
                            <i class="fas fa-recycle"></i>
                        </div>
                    </div>
                </div>
                
                <!-- Right Side -->
                <div class="col-md-7 login-right" style="float: left; width: 58.333333%;">
                    <h2 class="mb-4">Welcome Back! 👋</h2>
                    
                    <!-- Alert Messages -->
                    <div id="alert-container"></div>
                    
                    <!-- Tabs -->
                    <ul class="nav nav-tabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" 
                                    data-bs-target="#login" type="button" role="tab">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" 
                                    data-bs-target="#register" type="button" role="tab">
                                <i class="fas fa-user-plus"></i> Register
                            </button>
                        </li>
                    </ul>
                    
                    <div class="tab-content">
                        <!-- Login Form -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                            <form id="login-form" class="mt-4">
                                <div class="mb-3">
                                    <label for="login-email" class="form-label">
                                        <i class="fas fa-envelope"></i> Email or Phone
                                    </label>
                                    <input type="text" class="form-control" id="login-email" 
                                           placeholder="Enter your email or phone number" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="login-password" class="form-label">
                                        <i class="fas fa-lock"></i> Password
                                    </label>
                                    <input type="password" class="form-control" id="login-password" 
                                           placeholder="Enter your password" required>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember-me">
                                    <label class="form-check-label" for="remember-me">
                                        Remember me
                                    </label>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-sign-in-alt"></i> Login
                                </button>
                                
                                <div class="text-center my-3">
                                    <span class="text-muted">OR</span>
                                </div>
                                
                                <button type="button" class="btn btn-outline-success w-100 mb-2" id="demo-login-btn">
                                    <i class="fas fa-user-check"></i> Quick Demo Login 🚀
                                </button>
                                
                                <button type="button" class="btn btn-outline-danger w-100" id="google-login-btn" style="display:none;">
                                    <i class="fab fa-google"></i> Sign in with Google
                                </button>
                                <small class="text-muted d-block text-center mt-2">
                                    Google Sign-In requires OAuth setup. Use Demo Login for quick access.
                                </small>
                            </form>
                        </div>
                        
                        <!-- Register Form -->
                        <div class="tab-pane fade" id="register" role="tabpanel">
                            <form id="register-form" class="mt-4">
                                <div class="mb-3">
                                    <label for="register-name" class="form-label">
                                        <i class="fas fa-user"></i> Full Name
                                    </label>
                                    <input type="text" class="form-control" id="register-name" 
                                           placeholder="Enter your full name" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="register-email" class="form-label">
                                        <i class="fas fa-envelope"></i> Email
                                    </label>
                                    <input type="email" class="form-control" id="register-email" 
                                           placeholder="Enter your email" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="register-phone" class="form-label">
                                        <i class="fas fa-phone"></i> Phone Number (Optional)
                                    </label>
                                    <input type="tel" class="form-control" id="register-phone" 
                                           placeholder="Enter your phone number">
                                </div>
                                
                                <div class="mb-3">
                                    <label for="register-password" class="form-label">
                                        <i class="fas fa-lock"></i> Password
                                    </label>
                                    <input type="password" class="form-control" id="register-password" 
                                           placeholder="Create a password" required minlength="6">
                                </div>
                                
                                <div class="mb-3">
                                    <label for="register-confirm" class="form-label">
                                        <i class="fas fa-lock"></i> Confirm Password
                                    </label>
                                    <input type="password" class="form-control" id="register-confirm" 
                                           placeholder="Confirm your password" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="user-type" class="form-label">
                                        <i class="fas fa-user-tag"></i> I am a
                                    </label>
                                    <select class="form-select" id="user-type" required>
                                        <option value="student">Student</option>
                                        <option value="staff">Staff</option>
                                        <option value="admin">Administrator</option>
                                    </select>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-user-plus"></i> Register
                                </button>
                                
                                <div class="text-center my-3">
                                    <span class="text-muted">OR</span>
                                </div>
                                
                                <button type="button" class="btn btn-outline-danger w-100" id="google-register-btn">
                                    <i class="fab fa-google"></i> Sign up with Google
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div style="clear: both;"></div>
            </div>
        </div>
    </div>
    
    <!-- Google Sign-In Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Perfect Character Animation Sequence
        window.addEventListener('load', function() {
            const characterContainer = document.getElementById('character-container');
            const character = document.getElementById('character');
            const loginContainer = document.getElementById('login-container');
            const speechBubble = document.getElementById('speech-bubble');
            const hand = document.getElementById('character-hand');
            
            // Step 1: Character walks in (0-1.2s)
            setTimeout(() => {
                characterContainer.style.left = '200px';
            }, 100);
            
            // Step 2: Wave "Hi!" (1.3-2.5s)
            setTimeout(() => {
                speechBubble.textContent = 'Hi! 👋';
                speechBubble.classList.add('show');
                hand.classList.add('waving');
            }, 1300);
            
            // Step 3: Hide "Hi!" (2.5s)
            setTimeout(() => {
                speechBubble.classList.remove('show');
                hand.classList.remove('waving');
            }, 2600);
            
            // Step 4: Show "Let me help!" and move to center to pull (3s)
            setTimeout(() => {
                speechBubble.textContent = 'Let me help! 💪';
                speechBubble.classList.add('show');
                characterContainer.style.left = '35%';
            }, 3000);
            
            // Step 5: Pull container in (3.5s)
            setTimeout(() => {
                loginContainer.classList.add('slide-in');
            }, 3500);
            
            // Step 6: Move character to LEFT side (doesn't overlap) (5s)
            setTimeout(() => {
                speechBubble.classList.remove('show');
                characterContainer.style.left = '100px'; // Move to left side
            }, 5100);
            
            // Step 7: Playful "Bye!" with jumping (5.5s)
            setTimeout(() => {
                speechBubble.textContent = 'Bye! 👋';
                speechBubble.classList.add('show');
                hand.classList.add('waving');
                character.classList.add('jumping'); // Playful jump!
            }, 5600);
            
            // Step 8: Character walks away (7s)
            setTimeout(() => {
                speechBubble.classList.remove('show');
                hand.classList.remove('waving');
                character.classList.remove('jumping');
                characterContainer.style.left = '-300px'; // Exit left
            }, 7100);
            
            // Step 9: Remove from DOM (8s)
            setTimeout(() => {
                characterContainer.style.display = 'none';
            }, 8200);
        });
        
        // Google OAuth Configuration
        const GOOGLE_CLIENT_ID = '';
        
        function initializeGoogleSignIn() {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID || 'YOUR_GOOGLE_CLIENT_ID',
                callback: handleGoogleSignIn
            });
        }
        
        async function handleGoogleSignIn(response) {
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({credential: response.credential})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('session_token', data.session_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showAlert(data.message || 'Google sign-in failed');
                }
            } catch (error) {
                showAlert('An error occurred during Google sign-in.');
            }
        }
        
        document.getElementById('demo-login-btn').addEventListener('click', async function() {
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            this.disabled = true;
            
            try {
                const response = await fetch('/api/auth/demo-login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('session_token', data.session_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Demo login successful! Redirecting... 🎉', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showAlert(data.message || 'Demo login failed');
                    this.innerHTML = '<i class="fas fa-user-check"></i> Quick Demo Login 🚀';
                    this.disabled = false;
                }
            } catch (error) {
                showAlert('An error occurred during demo login.');
                this.innerHTML = '<i class="fas fa-user-check"></i> Quick Demo Login 🚀';
                this.disabled = false;
            }
        });
        
        document.getElementById('google-login-btn').addEventListener('click', function() {
            google.accounts.id.prompt();
        });
        
        document.getElementById('google-register-btn').addEventListener('click', function() {
            google.accounts.id.prompt();
        });
        
        window.addEventListener('load', function() {
            if (typeof google !== 'undefined') {
                initializeGoogleSignIn();
            }
        });
        
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
        
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email_or_phone: email, password: password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('session_token', data.session_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showAlert('Login successful! Redirecting... 🎉', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showAlert(data.message || 'Login failed');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const phone = document.getElementById('register-phone').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const userType = document.getElementById('user-type').value;
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            if (password !== confirm) {
                showAlert('Passwords do not match!');
                return;
            }
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        full_name: name,
                        phone: phone || null,
                        user_type: userType
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Registration successful! Please login. ✅', 'success');
                    document.getElementById('login-tab').click();
                    document.getElementById('register-form').reset();
                } else {
                    showAlert(data.message || 'Registration failed');
                }
                
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            } catch (error) {
                showAlert('An error occurred. Please try again.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        if (localStorage.getItem('session_token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
